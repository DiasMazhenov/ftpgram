services:
  - type: web
    name: ftpgram-backend
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_SESSION
        sync: false
      - key: TELEGRAM_STORAGE_CHAT
        sync: false
      - key: GOOGLE_VIEWER_SECRET
        generateValue: true
      - key: TELEGRAM_INDEX_LIMIT
        value: 0
      - key: DB_PATH
        value: /tmp/ftpgram.db
